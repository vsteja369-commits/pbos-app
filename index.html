<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBOS - Breeding System</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0;}
header { background:#2e7d32; color:white; padding:12px; text-align:center;}
.container { padding:10px;}
.card { background:white; padding:12px; margin-bottom:10px; border-radius:10px;}
input, select, textarea, button {
  width:100%; padding:10px; margin:5px 0;
  border-radius:6px; border:1px solid #ccc;
}
button { background:#2e7d32; color:white; font-weight:bold;}
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:5px; text-align:center;}
</style>
</head>

<body>

<header>
<h2>🌾 PBOS - Breeding System</h2>
</header>

<div class="container">

<div class="card">
<h3>Add Entry</h3>

<input id="lineId" placeholder="Line ID">
<select id="lineType">
<option>A Line</option>
<option>B Line</option>
<option>R Line</option>
<option>Hybrid</option>
</select>

<select id="rep">
<option>Rep 1</option>
<option>Rep 2</option>
<option>Rep 3</option>
</select>

<input id="traitName" placeholder="Trait Name">
<input id="traitValue" placeholder="Value">
<input id="traitUnit" placeholder="Unit (cm, g, %, etc)">

<button onclick="addTrait()">Add Trait</button>
<div id="traitsList"></div>

<button onclick="saveEntry()">Save Entry</button>
</div>

<div class="card">
<button onclick="clearAll()">Clear All Data</button>
</div>

<div class="card">
<h3>Entries</h3>
<div id="entries"></div>
</div>

<div class="card">
<h3>Table View</h3>
<div id="tableView"></div>
</div>

<div class="card">
<h3>Mean</h3>
<button onclick="calculateMean()">Calculate Mean</button>
<div id="analysis"></div>
</div>

<div class="card">
<h3>ANOVA (RBD)</h3>
<input id="anovaTrait" placeholder="Enter Trait Name">
<button onclick="runANOVA()">Run ANOVA</button>
<div id="anovaResult"></div>
</div>

</div>

<script>

let currentTraits = [];

function addTrait(){
  let name = traitName.value;
  let value = traitValue.value;
  let unit = traitUnit.value;

  if(name && value){
    currentTraits.push({name,value,unit});
    renderTraits();
  }

  traitName.value="";
  traitValue.value="";
  traitUnit.value="";
}

function renderTraits(){
  traitsList.innerHTML = currentTraits.map(t =>
    `<div>${t.name}: ${t.value}</div>`
  ).join("");
}

function saveEntry(){
  let entry = {
    id: lineId.value,
    type: lineType.value,
    rep: rep.value,
    traits: currentTraits
  };

  let data = JSON.parse(localStorage.getItem("pbos")||"[]");
  data.push(entry);
  localStorage.setItem("pbos", JSON.stringify(data));

  currentTraits=[];
  renderTraits();
  loadEntries();
}

function loadEntries(){
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  entries.innerHTML = data.map((e,index) =>
    `<div class="card">
      <b>${e.id}</b> (${e.type}) - ${e.rep}<br>
      ${e.traits.map(t=>`${t.name}: ${t.value} ${t.unit || ""}`).join("<br>")}
      <br><button onclick="deleteEntry(${index})">Delete</button>
    </div>`
  ).join("");

  renderTable();
}

function deleteEntry(i){
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");
  data.splice(i,1);
  localStorage.setItem("pbos", JSON.stringify(data));
  loadEntries();
}

function clearAll(){
  localStorage.removeItem("pbos");
  loadEntries();
}

function renderTable(){
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  let html = `<table>
  <tr><th>Line</th><th>Type</th><th>Rep</th><th>Trait</th><th>Value</th><th>Unit</th></tr>`;

  data.forEach(e=>{
    e.traits.forEach(t=>{
      html += `<tr>
  <td>${e.id}</td>
  <td>${e.type}</td>
  <td>${e.rep}</td>
  <td>${t.name}</td>
  <td>${t.value}</td>
  <td>${t.unit || ""}</td>
</tr>`;
    });
  });

  html += "</table>";

  tableView.innerHTML = html;
}

function calculateMean(){
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");
  let result = {};

  data.forEach(e=>{
    e.traits.forEach(t=>{
      let key = e.id + "-" + t.name;

      if(!result[key]) result[key]={sum:0,count:0};

      let val = parseFloat(t.value);
      if(!isNaN(val)){
        result[key].sum += val;
        result[key].count++;
      }
    });
  });

  let out="";
  for(let k in result){
    let mean = result[k].sum/result[k].count;
    out += `${k}: ${mean.toFixed(2)}<br>`;
  }

  analysis.innerHTML = out;
}

function runANOVA(){
  let trait = anovaTrait.value;
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  let filtered = [];

  data.forEach(e=>{
    e.traits.forEach(t=>{
      if(t.name.toLowerCase() === trait.toLowerCase()){  // ✅ FIXED
        let val=parseFloat(t.value);
        if(!isNaN(val)){
          filtered.push({line:e.id,rep:e.rep,value:val});
        }
      }
    });
  });

  if(filtered.length===0){
    anovaResult.innerHTML="No data";
    return;
  }

  let total = filtered.reduce((a,b)=>a+b.value,0);
  let gm = total/filtered.length;

  let treat={}, reps={};

  filtered.forEach(d=>{
    if(!treat[d.line]) treat[d.line]=[];
    if(!reps[d.rep]) reps[d.rep]=[];
    treat[d.line].push(d.value);
    reps[d.rep].push(d.value);
  });

  let tm={}, rm={};

  for(let t in treat){
    tm[t]=treat[t].reduce((a,b)=>a+b,0)/treat[t].length;
  }

  for(let r in reps){
    rm[r]=reps[r].reduce((a,b)=>a+b,0)/reps[r].length;
  }

  let SST = filtered.reduce((s,d)=>s+Math.pow(d.value-gm,2),0);

  let SSTr=0;
  for(let t in tm){
    SSTr += treat[t].length*Math.pow(tm[t]-gm,2);
  }

  let SSRep=0;
  for(let r in rm){
    SSRep += reps[r].length*Math.pow(rm[r]-gm,2);
  }

  let SSE = SST-SSTr-SSRep;

  let t=Object.keys(treat).length;
  let r=Object.keys(reps).length;

  let dfError = (t-1)*(r-1);
  let MSTr = SSTr/(t-1);
  let MSE = dfError>0 ? SSE/dfError : 0;
  let F = MSE!==0 ? MSTr/MSE : 0;
  // ===== LSD CALCULATION =====

let tValue = 2; // approx value (can refine later)
let rRep = r;   // number of replications

let LSD = MSE !== 0 ? tValue * Math.sqrt((2 * MSE) / rRep) : 0;

  let out=`Grand Mean: ${gm.toFixed(2)}<br><br>`;

  out+="Treatment Means:<br>";
  for(let t in tm) out+=`${t}: ${tm[t].toFixed(2)}<br>`;

  out+="<br>ANOVA:<br>";
  out+=`LSD (approx): ${LSD.toFixed(2)}<br>`;
  out+=`SS Treatment: ${SSTr.toFixed(2)}<br>`;
  out+=`SS Rep: ${SSRep.toFixed(2)}<br>`;
  out+=`SS Error: ${SSE.toFixed(2)}<br>`;
  out+=`F: ${F.toFixed(2)}<br>`;
  // ===== PAIRWISE COMPARISON =====

out += "<br><b>Comparison (LSD test):</b><br>";

let lines = Object.keys(tm);

for(let i=0; i<lines.length; i++){
  for(let j=i+1; j<lines.length; j++){

    let l1 = lines[i];
    let l2 = lines[j];

    let diff = Math.abs(tm[l1] - tm[l2]);

    let significance = diff > LSD ? "Significant ✅" : "Not Significant ❌";

    out += `${l1} vs ${l2} → Diff: ${diff.toFixed(2)} → ${significance}<br>`;
  }
}
// ===== RANKING + BEST LINE =====

out += "<br><b>Ranking:</b><br>";

// Convert means to array
let ranking = Object.keys(tm).map(line => ({
  line: line,
  mean: tm[line]
}));

// Sort descending (highest first)
ranking.sort((a,b)=>b.mean - a.mean);

// Display ranking
ranking.forEach((r,i)=>{
  out += `${i+1}. ${r.line} → ${r.mean.toFixed(2)}<br>`;
});

// Highlight best line
let best = ranking[0];

out += `<br><b>Best Line:</b> ⭐ ${best.line} (Mean: ${best.mean.toFixed(2)})<br>`;
  anovaResult.innerHTML=out;
}

loadEntries();

</script>

</body>
</html>
