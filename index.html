<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBOS - Breeding System</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0;}
header { background:#2e7d32; color:white; padding:12px; text-align:center;}
.container { padding:10px;}
.card { background:white; padding:12px; margin-bottom:10px; border-radius:10px;}
input, select, textarea, button {
  width:100%; padding:10px; margin:5px 0;
  border-radius:6px; border:1px solid #ccc;
}
button { background:#2e7d32; color:white; font-weight:bold;}
.small { font-size:12px; color:gray;}
</style>
</head>

<body>

<header>
<h2>🌾 PBOS - Breeding System</h2>
</header>

<div class="container">

<!-- ENTRY SYSTEM -->
<div class="card">
<h3>Add Entry</h3>

<input id="lineId" placeholder="Line ID (A12, R45)">
<select id="lineType">
<option>A Line</option>
<option>B Line</option>
<option>R Line</option>
<option>Hybrid</option>
</select>

<select id="rep">
<option>Rep 1</option>
<option>Rep 2</option>
<option>Rep 3</option>
</select>

<input id="block" placeholder="Block / Field">
<input id="plot" placeholder="Plot No">

<input id="traitName" placeholder="Trait Name">
<input id="traitValue" placeholder="Trait Value">
<input id="traitUnit" placeholder="Unit">

<button onclick="addTrait()">Add Trait</button>

<div id="traitsList"></div>

<button onclick="saveEntry()">Save Entry</button>
</div>

<!-- DAILY LOG -->
<div class="card">
<h3>Daily Log</h3>

<textarea id="logText" placeholder="Write your daily farm notes here..."></textarea>
<button onclick="saveLog()">Save Log</button>

<div id="logs"></div>
</div>

<!-- DATA VIEW -->
<div class="card">
<button onclick="clearAll()">Clear All Data</button>
<h3>Entries</h3>
<div id="entries"></div>
<h3>Data Table View</h3>
<div id="tableView"></div>
</div>

</div>

<script>
let currentTraits = [];

// Add trait
function addTrait(){
  let name = traitName.value;
  let value = traitValue.value;
  let unit = traitUnit.value;

  if(name && value){
    currentTraits.push({name,value,unit});
    renderTraits();
  }

  traitName.value="";
  traitValue.value="";
  traitUnit.value="";
}

function renderTraits(){
  traitsList.innerHTML = currentTraits.map(t =>
    `<div class="small">${t.name}: ${t.value} ${t.unit}</div>`
  ).join("");
}

// Save entry
function saveEntry(){
  let entry = {
    id: lineId.value,
    type: lineType.value,
    rep: rep.value,
    block: block.value,
    plot: plot.value,
    traits: currentTraits,
    date: new Date().toLocaleString()
  };

  let data = JSON.parse(localStorage.getItem("pbos")||"[]");
  data.push(entry);
  localStorage.setItem("pbos", JSON.stringify(data));

  currentTraits=[];
  renderTraits();
  loadEntries();
}

// Load entries
function loadEntries(){
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  entries.innerHTML = data.map((e,index) =>
  `<div class="card">
    <b>${e.id}</b> (${e.type})<br>
    ${e.rep} | Block: ${e.block} | Plot: ${e.plot}<br>
    ${e.traits.map(t=>`${t.name}: ${t.value} ${t.unit}`).join("<br>")}
    <br>
    <button onclick="deleteEntry(${index})">Delete</button>
  </div>`
).join("");

  renderTable();
}

// DAILY LOG SAVE
function saveLog(){
  let log = {
    text: logText.value,
    date: new Date().toLocaleString()
  };

  let logs = JSON.parse(localStorage.getItem("logs")||"[]");
  logs.push(log);
  localStorage.setItem("logs", JSON.stringify(logs));

  logText.value="";
  loadLogs();
}

// LOAD LOGS + SIMPLE EXTRACTION
function loadLogs(){
  let logs = JSON.parse(localStorage.getItem("logs")||"[]");

  logsDiv = logs.map(l=>{
    let extracted = extractData(l.text);
    return `<div class="card">
      <b>${l.date}</b><br>
      ${l.text}<br>
      <span class="small">Extracted: ${extracted}</span>
    </div>`;
  }).join("");

  document.getElementById("logs").innerHTML = logsDiv;
}

// SIMPLE EXTRACTION
function extractData(text){
  let lines = text.match(/[A-Z]\d+/g) || [];
  let crosses = text.match(/[A-Z]\d+\s?x\s?[A-Z]\d+/gi) || [];
  return `Lines: ${lines.join(", ")} | Crosses: ${crosses.join(", ")}`;
}

loadEntries();
loadLogs();
function calculateMean(){
  let data = JSON.parse(localStorage.getItem("pbos") || "[]");

  let result = {};

  data.forEach(entry => {
    entry.traits.forEach(trait => {
      let key = entry.id + " - " + trait.name;

      if(!result[key]){
        result[key] = {sum:0, count:0};
      }

      let val = parseFloat(trait.value);

      if(!isNaN(val)){
        result[key].sum += val;
        result[key].count += 1;
      }
    });
  });

  let output = "";

  for(let key in result){
    let mean = result[key].sum / result[key].count;
    output += `<div>${key} → Mean: ${mean.toFixed(2)}</div>`;
  }

  document.getElementById("analysis").innerHTML = output;
}
function deleteEntry(index){
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");
  data.splice(index,1);
  localStorage.setItem("pbos", JSON.stringify(data));
  loadEntries();
}

function clearAll(){
  if(confirm("Delete all data?")){
    localStorage.removeItem("pbos");
    loadEntries();
  }
}
function renderTable(){
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  let html = `<table border="1" style="width:100%; border-collapse:collapse;">
  <tr>
    <th>Line</th>
    <th>Type</th>
    <th>Rep</th>
    <th>Trait</th>
    <th>Value</th>
    <th>Unit</th>
  </tr>`;

  data.forEach(e=>{
    e.traits.forEach(t=>{
      html += `<tr>
        <td>${e.id}</td>
        <td>${e.type}</td>
        <td>${e.rep}</td>
        <td>${t.name}</td>
        <td>${t.value}</td>
        <td>${t.unit}</td>
      </tr>`;
    });
  });

  html += "</table>";

  document.getElementById("tableView").innerHTML = html;
}
function runANOVA(){
  let traitName = document.getElementById("anovaTrait").value;

  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  let filtered = [];

  data.forEach(e=>{
    e.traits.forEach(t=>{
      if(t.name === traitName){
        let val = parseFloat(t.value);
        if(!isNaN(val)){
          filtered.push({
            line: e.id,
            rep: e.rep,
            value: val
          });
        }
      }
    });
  });

  if(filtered.length === 0){
    document.getElementById("anovaResult").innerHTML = "No data found";
    return;
  }
// ===== CALCULATIONS =====

// Grand Mean
let total = filtered.reduce((a,b)=>a+b.value,0);
let grandMean = total / filtered.length;

// Treatment grouping
let treatment = {};
filtered.forEach(d=>{
  if(!treatment[d.line]) treatment[d.line]=[];
  treatment[d.line].push(d.value);
});

// Treatment Means
let treatmentMeans = {};
for(let t in treatment){
  let sum = treatment[t].reduce((a,b)=>a+b,0);
  treatmentMeans[t] = sum / treatment[t].length;
}

// Rep grouping
let reps = {};
filtered.forEach(d=>{
  if(!reps[d.rep]) reps[d.rep]=[];
  reps[d.rep].push(d.value);
});

// Rep Means
let repMeans = {};
for(let r in reps){
  let sum = reps[r].reduce((a,b)=>a+b,0);
  repMeans[r] = sum / reps[r].length;
}

// ===== SS =====

// Total SS
let SST = filtered.reduce((sum,d)=> sum + Math.pow(d.value - grandMean,2),0);

// Treatment SS
let SSTreat = 0;
for(let t in treatment){
  let mean = treatmentMeans[t];
  let n = treatment[t].length;
  SSTreat += n * Math.pow(mean - grandMean,2);
}

// Rep SS
let SSRep = 0;
for(let r in reps){
  let mean = repMeans[r];
  let n = reps[r].length;
  SSRep += n * Math.pow(mean - grandMean,2);
}

// Error SS
let SSE = SST - SSTreat - SSRep;

// DF
let t = Object.keys(treatment).length;
let r = Object.keys(reps).length;

let dfTreat = t - 1;
let dfRep = r - 1;
let dfError = (t-1)*(r-1);

// MS
let MSTreat = SSTreat / dfTreat;
let MSE = SSE / dfError;

// F
let F = MSTreat / MSE;

// ===== OUTPUT =====

let out = `<b>Grand Mean:</b> ${grandMean.toFixed(2)}<br><br>`;

out += "<b>Treatment Means:</b><br>";
for(let t in treatmentMeans){
  out += `${t}: ${treatmentMeans[t].toFixed(2)}<br>`;
}

out += "<br><b>Replication Means:</b><br>";
for(let r in repMeans){
  out += `${r}: ${repMeans[r].toFixed(2)}<br>`;
}

out += "<br><b>ANOVA Table:</b><br>";
out += `Treatment SS: ${SSTreat.toFixed(2)}<br>`;
out += `Replication SS: ${SSRep.toFixed(2)}<br>`;
out += `Error SS: ${SSE.toFixed(2)}<br>`;
out += `F-value: ${F.toFixed(2)}<br>`;

document.getElementById("anovaResult").innerHTML = out;
  // Grand Mean
  let total = filtered.reduce((a,b)=>a+b.value,0);
  let grandMean = total / filtered.length;

  // Treatment Means
  let treatment = {};
  filtered.forEach(d=>{
    if(!treatment[d.line]) treatment[d.line]=[];
    treatment[d.line].push(d.value);
  });

  let treatmentMeans = {};
  for(let t in treatment){
    let sum = treatment[t].reduce((a,b)=>a+b,0);
    treatmentMeans[t] = sum / treatment[t].length;
  }

  // Replication Means
  let reps = {};
  filtered.forEach(d=>{
    if(!reps[d.rep]) reps[d.rep]=[];
    reps[d.rep].push(d.value);
  });

  let repMeans = {};
  for(let r in reps){
    let sum = reps[r].reduce((a,b)=>a+b,0);
    repMeans[r] = sum / reps[r].length;
  }

  // Output
  let out = `<b>Grand Mean:</b> ${grandMean.toFixed(2)}<br><br>`;

  out += "<b>Treatment Means:</b><br>";
  for(let t in treatmentMeans){
    out += `${t}: ${treatmentMeans[t].toFixed(2)}<br>`;
  }

  out += "<br><b>Replication Means:</b><br>";
  for(let r in repMeans){
    out += `${r}: ${repMeans[r].toFixed(2)}<br>`;
  }

  document.getElementById("anovaResult").innerHTML = out;
}
</script>
<div class="card">
<h3>Analysis</h3>
<button onclick="calculateMean()">Calculate Mean</button>
<div id="analysis"></div>
</div>
<div class="card">
<h3>ANOVA (RBD)</h3>

<input id="anovaTrait" placeholder="Enter Trait Name (exact)">
<button onclick="runANOVA()">Run ANOVA</button>

<div id="anovaResult"></div>
</div>
</body>
</html>
