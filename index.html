<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌾 Breeding Decision Engine</title>

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(120deg,#e8f5e9,#f1f8e9);
  margin:0;
}

header {
  background:#2e7d32;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container {padding:10px;}

.card {
  background:white;
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h3 {color:#2e7d32;}

input,select,textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#43a047;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  margin-top:5px;
  font-weight:bold;
}

button:hover {background:#2e7d32;}

table {
  width:100%;
  border-collapse:collapse;
}

th {
  background:#81c784;
  color:white;
}

td,th {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

.good {color:green; font-weight:bold;}
.bad {color:red; font-weight:bold;}
</style>
</head>

<body>

<header>🌾 Breeding Intelligence Engine</header>

<div class="container">

<div class="card">
<h3>➕ Add Parent Data</h3>

<input id="line" placeholder="Line Name">
<select id="type">
<option>A Line</option>
<option>B Line</option>
<option>R Line</option>
</select>

<input id="flower" placeholder="Days to Flowering">
<input id="height" placeholder="Plant Height">
<input id="tiller" placeholder="Tillers">
<input id="stigma" placeholder="Stigma Exertion">
<input id="pollen" placeholder="Pollen Shedding">

<button onclick="addEntry()">Add</button>
</div>

<div class="card">
<h3>📊 Data</h3>
<div id="table"></div>
</div>

<div class="card">
<h3>🌱 Classification</h3>
<button onclick="classify()">Run</button>
<div id="classOut"></div>
</div>

<div class="card">
<h3>🤖 Cross Suggestions</h3>
<button onclick="suggest()">Generate</button>
<div id="crossOut"></div>
</div>

</div>

<script>

function getData(){
 return JSON.parse(localStorage.getItem("lines")||"[]");
}

function setData(d){
 localStorage.setItem("lines",JSON.stringify(d));
}

function addEntry(){

 let d=getData();

 d.push({
  id:line.value,
  type:type.value,
  flower:+flower.value,
  height:+height.value,
  tiller:+tiller.value,
  stigma:+stigma.value,
  pollen:+pollen.value
 });

 setData(d);
 loadTable();
}

function loadTable(){

 let d=getData();

 let html="<table><tr><th>Line</th><th>Type</th><th>Flower</th><th>Height</th><th>Tiller</th></tr>";

 d.forEach(x=>{
  html+=`<tr>
  <td>${x.id}</td>
  <td>${x.type}</td>
  <td>${x.flower}</td>
  <td>${x.height}</td>
  <td>${x.tiller}</td>
  </tr>`;
 });

 html+="</table>";

 table.innerHTML=html;
}

function classify(){

 let d=getData();

 let out="";

 d.forEach(x=>{

  let score=0;
  let reject=false;

  if(x.type=="A Line"){
   if(x.stigma<20) reject=true;
   else score+=2;
  }

  if(x.type=="R Line"){
   if(x.pollen<5) reject=true;
   else score+=2;
  }

  if(x.tiller<8) reject=true;
  else score+=1;

  if(x.height<120) score+=1;

  out+=`${x.id} → ${reject ? "<span class='bad'>Rejected</span>" : "<span class='good'>Selected</span>"}<br>`;
 });

 classOut.innerHTML=out;
}

function suggest(){

 let d=getData();

 let A=d.filter(x=>x.type=="A Line");
 let R=d.filter(x=>x.type=="R Line");

 let out="";

 A.forEach(a=>{
  R.forEach(r=>{

   let score=0;

   let diff=Math.abs(a.flower-r.flower);

   if(diff<=3) score+=3;
   else if(diff<=7) score+=1;
   else score-=2;

   if(a.tiller>10) score+=1;
   if(r.tiller>10) score+=1;

   if(a.height<120 && r.height<120) score+=1;

   let tag="Moderate";

   if(score>=5) tag="High ✔";
   if(score<=1) tag="Poor ❌";

   out+=`${a.id} × ${r.id} → ${tag}<br>`;
  });
 });

 crossOut.innerHTML=out;
}

loadTable();

</script>

</body>
</html>
