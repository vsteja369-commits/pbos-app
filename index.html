<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌾 Advanced Breeding Intelligence</title>

<style>
body {font-family: Arial; background:#e8f5e9;}
.card {background:white; margin:10px; padding:10px; border-radius:10px;}
h2 {text-align:center; color:#2e7d32;}
button {background:#43a047;color:white;border:none;padding:6px;border-radius:5px;}
table {width:100%; border-collapse:collapse;}
td,th {border:1px solid #ccc; padding:5px;}
</style>
</head>

<body>

<h2>🌾 Advanced Breeding System</h2>

<div class="card">
<textarea id="excelInput" rows="5"></textarea><br>
<button onclick="importExcel()">Import</button>
<button onclick="clearData()">Clear</button>
</div>

<div class="card">
<div id="tableView"></div>
<button onclick="addRow()">Add Row</button>
</div>

<div class="card">
<h3>ANOVA</h3>
<input id="anovaTrait">
<button onclick="runANOVA()">Run</button>
<div id="anovaResult"></div>
</div>

<div class="card">
<h3>Experimental Designs</h3>
<input id="treatments" placeholder="Treatments">
<input id="replications" placeholder="Replications">
<button onclick="genRBD()">RBD</button>
<button onclick="genCRD()">CRD</button>
<div id="designOut"></div>
</div>

<div class="card">
<h3>GCA / SCA</h3>
<input id="gcaTrait">
<button onclick="runGCA()">Run</button>
<div id="gcaOut"></div>
</div>

<div class="card">
<h3>Outcome AI</h3>
<input id="crossName" placeholder="A1 x R1">
<input id="yieldVal" placeholder="Yield">
<input id="flowerVal" placeholder="Flowering days">
<input id="tillerVal" placeholder="Tillers">
<input id="lodgingVal" placeholder="Lodging">
<button onclick="saveOutcome()">Save</button>
<button onclick="runAI()">Run AI</button>
<div id="aiOut"></div>
</div>

<script>

// ===== DATA =====
function getData(){return JSON.parse(localStorage.getItem("pbos")||"[]");}
function setData(d){localStorage.setItem("pbos",JSON.stringify(d));}

// ===== IMPORT =====
function importExcel(){
 let lines=excelInput.value.split("\n");
 let headers=lines[0].split(",");
 let d=getData();

 for(let i=1;i<lines.length;i++){
  let p=lines[i].split(",");
  let traits=[];
  for(let j=3;j<headers.length;j++){
   traits.push({name:headers[j].toLowerCase(),value:+p[j]});
  }
  d.push({id:p[0],type:p[1],rep:p[2],traits});
 }
 setData(d); loadTable();
}

// ===== TABLE =====
function loadTable(){
 let d=getData();
 let html="<table><tr><th>Line</th><th>Trait</th><th>Value</th></tr>";
 d.forEach((e,i)=>{
  e.traits.forEach(t=>{
   html+=`<tr>
   <td contenteditable>${e.id}</td>
   <td contenteditable>${t.name}</td>
   <td contenteditable>${t.value}</td>
   </tr>`;
  });
 });
 html+="</table>";
 tableView.innerHTML=html;
}

function addRow(){
 let d=getData();
 d.push({id:"",type:"",rep:"",traits:[{name:"",value:""}]});
 setData(d); loadTable();
}

function clearData(){localStorage.clear();loadTable();}

// ===== ANOVA =====
function runANOVA(){
 let trait=anovaTrait.value.toLowerCase();
 let d=getData();
 let arr=[];

 d.forEach(e=>{
  e.traits.forEach(t=>{
   if(t.name==trait){
    arr.push({line:e.id,value:t.value});
   }
  });
 });

 let gm=arr.reduce((a,b)=>a+b.value,0)/arr.length;

 let groups={};
 arr.forEach(x=>{
  if(!groups[x.line]) groups[x.line]=[];
  groups[x.line].push(x.value);
 });

 let out="Means:<br>";
 for(let k in groups){
  let m=groups[k].reduce((a,b)=>a+b,0)/groups[k].length;
  out+=`${k}: ${m.toFixed(2)}<br>`;
 }

 anovaResult.innerHTML=out;
}

// ===== DESIGNS =====
function genRBD(){
 let t=+treatments.value,r=+replications.value;
 let out="";
 for(let i=1;i<=r;i++){
  let arr=[...Array(t).keys()].map(x=>"T"+(x+1));
  arr.sort(()=>Math.random()-0.5);
  out+="Rep "+i+": "+arr.join(", ")+"<br>";
 }
 designOut.innerHTML=out;
}

function genCRD(){
 let t=+treatments.value;
 let arr=[...Array(t).keys()].map(x=>"T"+(x+1));
 arr.sort(()=>Math.random()-0.5);
 designOut.innerHTML="CRD: "+arr.join(", ");
}

// ===== GCA SCA =====
function runGCA(){
 let trait=gcaTrait.value.toLowerCase();
 let d=getData();
 let crosses=[];

 d.forEach(e=>{
  if(e.type=="Hybrid"){
   e.traits.forEach(t=>{
    if(t.name==trait){
     let [A,R]=e.id.split("x").map(x=>x.trim());
     crosses.push({A,R,value:t.value});
    }
   });
  }
 });

 let gm=crosses.reduce((a,b)=>a+b.value,0)/crosses.length;

 let Amap={},Rmap={};

 crosses.forEach(c=>{
  if(!Amap[c.A])Amap[c.A]=[];
  if(!Rmap[c.R])Rmap[c.R]=[];
  Amap[c.A].push(c.value);
  Rmap[c.R].push(c.value);
 });

 let out="GCA A:<br>";
 for(let a in Amap){
  let m=Amap[a].reduce((x,y)=>x+y,0)/Amap[a].length;
  out+=`${a}: ${(m-gm).toFixed(2)}<br>`;
 }

 out+="<br>GCA R:<br>";
 for(let r in Rmap){
  let m=Rmap[r].reduce((x,y)=>x+y,0)/Rmap[r].length;
  out+=`${r}: ${(m-gm).toFixed(2)}<br>`;
 }

 out+="<br>SCA:<br>";
 crosses.forEach(c=>{
  let sca=c.value-gm;
  out+=`${c.A} x ${c.R}: ${sca.toFixed(2)}<br>`;
 });

 gcaOut.innerHTML=out;
}

// ===== OUTCOME =====
function saveOutcome(){
 let o=JSON.parse(localStorage.getItem("out")||"[]");
 o.push({
  cross:crossName.value,
  yield:+yieldVal.value,
  flowering:+flowerVal.value,
  tiller:+tillerVal.value,
  lodging:lodgingVal.value
 });
 localStorage.setItem("out",JSON.stringify(o));
}

// ===== AI =====
function runAI(){
 let o=JSON.parse(localStorage.getItem("out")||"[]");
 let out="";

 o.forEach(x=>{
  if(x.lodging=="severe") out+=`${x.cross}: reduce height<br>`;
  if(x.flowering>130) out+=`${x.cross}: too late<br>`;
  if(x.tiller<8) out+=`${x.cross}: improve tillering<br>`;
  if(x.yield>3) out+=`${x.cross}: good cross refine<br>`;
 });

 aiOut.innerHTML=out;
}

// INIT
loadTable();

</script>

</body>
</html>
