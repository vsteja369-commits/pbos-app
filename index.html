<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeding Intelligence System</title>

<style>
body {font-family: Arial; background:#f4f4f4;}
.card {background:white; padding:10px; margin:10px; border-radius:8px;}
button {padding:8px; margin:5px;}
table {width:100%; border-collapse:collapse;}
td,th {border:1px solid #ccc; padding:6px;}
img {width:60px;}
</style>
</head>

<body>

<h2 style="text-align:center;">🌾 Breeding Intelligence System</h2>

<div class="card">
<h3>Excel Entry</h3>
<textarea id="excelInput" rows="6" placeholder="Line,Type,Rep,Plant Height,Yield"></textarea>
<br>
<button onclick="importExcel()">Import</button>
<button onclick="clearData()">Clear All Data</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportWord()">Export Word</button>
</div>

<div class="card">
<h3>Editable Table</h3>
<div id="tableView"></div>
<button onclick="addRow()">Add Row</button>
</div>

<div class="card">
<h3>Parent Classification</h3>
<button onclick="runClassification()">Run</button>
<div id="classResult"></div>
</div>

<div class="card">
<h3>Cross Outcome</h3>
<input id="crossName" placeholder="A1 x R1">
<input id="yieldVal" placeholder="Yield">
<input id="lodgingVal" placeholder="Lodging">
<input id="diseaseVal" placeholder="Disease">
<button onclick="saveOutcome()">Save</button>
<div id="outcomeMsg"></div>
</div>

<div class="card">
<h3>AI Suggestions</h3>
<button onclick="recommendNext()">Run AI</button>
<div id="aiNext"></div>
</div>

<script>

// ===== IMPORT =====
function importExcel(){
 let text = excelInput.value.trim();
 if(!text) return;

 let lines = text.split("\n");
 let headers = lines[0].split(",").map(h=>h.trim().toLowerCase());

 let data = JSON.parse(localStorage.getItem("pbos")||"[]");

 for(let i=1;i<lines.length;i++){
  let parts = lines[i].split(",").map(x=>x.trim());

  let traits=[];
  for(let j=3;j<headers.length;j++){
    if(parts[j]){
      traits.push({name:headers[j], value:parts[j]});
    }
  }

  data.push({
    id:parts[0],
    type:parts[1],
    rep:parts[2],
    photo:"",
    traits:traits
  });
 }

 localStorage.setItem("pbos", JSON.stringify(data));
 loadTable();
}

// ===== CLEAR =====
function clearData(){
 if(confirm("Delete all data?")){
  localStorage.removeItem("pbos");
  loadTable();
 }
}

// ===== TABLE =====
function loadTable(){

 let data = JSON.parse(localStorage.getItem("pbos")||"[]");

 let html="<table><tr><th>Line</th><th>Type</th><th>Rep</th><th>Trait</th><th>Value</th><th>Photo</th><th>Delete</th></tr>";

 data.forEach((e,i)=>{
  e.traits.forEach((t,j)=>{
    html+=`<tr>
      <td contenteditable onblur="saveTable()">${e.id}</td>
      <td contenteditable onblur="saveTable()">${e.type}</td>
      <td contenteditable onblur="saveTable()">${e.rep}</td>
      <td contenteditable onblur="saveTable()">${t.name}</td>
      <td contenteditable onblur="saveTable()">${t.value}</td>
      <td>
        <input type="file" onchange="uploadPhoto(event,${i})">
        ${e.photo ? `<img src="${e.photo}">` : ""}
      </td>
      <td><button onclick="deleteRow(${i})">X</button></td>
    </tr>`;
  });
 });

 html+="</table>";
 tableView.innerHTML=html;
}

// ===== SAVE =====
function saveTable(){
 let rows = document.querySelectorAll("#tableView table tr");
 let newData=[];

 rows.forEach((r,i)=>{
  if(i===0) return;

  let c=r.querySelectorAll("td");

  newData.push({
    id:c[0].innerText,
    type:c[1].innerText,
    rep:c[2].innerText,
    photo:"",
    traits:[{name:c[3].innerText, value:c[4].innerText}]
  });
 });

 localStorage.setItem("pbos", JSON.stringify(newData));
}

// ===== ADD ROW =====
function addRow(){
 let data = JSON.parse(localStorage.getItem("pbos")||"[]");
 data.push({id:"",type:"",rep:"",photo:"",traits:[{name:"",value:""}]});
 localStorage.setItem("pbos", JSON.stringify(data));
 loadTable();
}

// ===== DELETE =====
function deleteRow(index){
 let data = JSON.parse(localStorage.getItem("pbos")||"[]");
 data.splice(index,1);
 localStorage.setItem("pbos", JSON.stringify(data));
 loadTable();
}

// ===== PHOTO =====
function uploadPhoto(e,i){
 let reader=new FileReader();
 reader.onload=function(){
  let data = JSON.parse(localStorage.getItem("pbos")||"[]");
  data[i].photo=reader.result;
  localStorage.setItem("pbos", JSON.stringify(data));
  loadTable();
 };
 reader.readAsDataURL(e.target.files[0]);
}

// ===== EXPORT =====
function exportExcel(){
 let data = JSON.parse(localStorage.getItem("pbos")||"[]");

 let csv="Line,Type,Rep,Trait,Value\n";

 data.forEach(e=>{
  e.traits.forEach(t=>{
    csv+=`${e.id},${e.type},${e.rep},${t.name},${t.value}\n`;
  });
 });

 let blob = new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="data.csv";
 a.click();
}

function exportWord(){
 let data = JSON.parse(localStorage.getItem("pbos")||"[]");

 let text="Breeding Data\n\n";

 data.forEach(e=>{
  text+=`Line: ${e.id}\nType: ${e.type}\n`;
  e.traits.forEach(t=>{
    text+=`${t.name}: ${t.value}\n`;
  });
  text+="\n";
 });

 let blob=new Blob([text],{type:"application/msword"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="data.doc";
 a.click();
}

// ===== CLASSIFICATION =====
function runClassification(){

 let data = JSON.parse(localStorage.getItem("pbos")||"[]");

 let out="";

 data.forEach(e=>{
  let score=0;

  e.traits.forEach(t=>{
    if(t.name.toLowerCase()=="stigma exertion" && t.value>20) score+=2;
    if(t.name.toLowerCase()=="pollen shedding" && t.value>5) score+=2;
  });

  let status = score>=2 ? "Selected" : "Rejected";

  out+=`${e.id} → ${status} (Score ${score})<br>`;
 });

 classResult.innerHTML=out;
}

// ===== OUTCOME =====
function saveOutcome(){

 let outcomes = JSON.parse(localStorage.getItem("outcomes")||"[]");

 outcomes.push({
  cross:crossName.value,
  yield:+yieldVal.value,
  lodging:lodgingVal.value.toLowerCase(),
  disease:diseaseVal.value.toLowerCase()
 });

 localStorage.setItem("outcomes", JSON.stringify(outcomes));

 outcomeMsg.innerHTML="Saved";
}

// ===== AI =====
function recommendNext(){

 let outcomes = JSON.parse(localStorage.getItem("outcomes")||"[]");
 let data = JSON.parse(localStorage.getItem("pbos")||"[]");

 if(!outcomes.length){
  aiNext.innerHTML="No data";
  return;
 }

 let out="<b>AI Suggestions</b><br>";

 outcomes.forEach(o=>{

  if(o.lodging=="severe"){
    out+=`${o.cross} → Use short strong parent<br>`;
  }

  if(o.disease=="high"){
    out+=`${o.cross} → Add tolerant line<br>`;
  }

  if(o.yield>=3){
    out+=`${o.cross} → Good cross refine it<br>`;
  }

 });

 aiNext.innerHTML=out;
}

// INIT
loadTable();

</script>

</body>
</html>
