<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breeding Intelligence Full System</title>

<style>
body {font-family: Arial; background:#f4f4f4;}
.card {background:white; padding:10px; margin:10px; border-radius:8px;}
button {padding:8px; margin:5px;}
table {width:100%; border-collapse:collapse;}
td,th {border:1px solid #ccc; padding:6px;}
input,textarea {width:100%; margin:5px 0; padding:6px;}
</style>
</head>

<body>

<h2 style="text-align:center;">🌾 Full Breeding Intelligence System</h2>

<!-- ================= DATA ENTRY ================= -->
<div class="card">
<h3>Excel Data Entry</h3>
<textarea id="excelInput" rows="6" placeholder="Line,Type,Rep,Days to 50% Flowering,Yield"></textarea>
<button onclick="importExcel()">Import</button>
<button onclick="clearData()">Clear</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="exportWord()">Export Word</button>
</div>

<!-- ================= TABLE ================= -->
<div class="card">
<h3>Editable Table</h3>
<div id="tableView"></div>
<button onclick="addRow()">Add Row</button>
</div>

<!-- ================= CLASSIFICATION ================= -->
<div class="card">
<h3>Parent Classification</h3>
<button onclick="runClassification()">Run</button>
<div id="classResult"></div>
</div>

<!-- ================= SELECTION INDEX ================= -->
<div class="card">
<h3>Selection Index</h3>
<input id="traitsListInput" placeholder="yield,height">
<input id="weightsInput" placeholder="0.7,0.3">
<button onclick="runSelectionIndex()">Run</button>
<div id="siResult"></div>
</div>

<!-- ================= ANOVA ================= -->
<div class="card">
<h3>ANOVA</h3>
<input id="anovaTrait" placeholder="Trait">
<button onclick="runANOVA()">Run</button>
<div id="anovaResult"></div>
</div>

<!-- ================= EXPERIMENTAL DESIGN ================= -->
<div class="card">
<h3>Experimental Design (RBD Layout)</h3>
<input id="treatments" placeholder="No. of Treatments">
<input id="replications" placeholder="Replications">
<button onclick="generateRBD()">Generate Layout</button>
<div id="rbdResult"></div>
</div>

<!-- ================= GCA SCA ================= -->
<div class="card">
<h3>GCA / SCA</h3>
<input id="gcaTrait" placeholder="Trait">
<button onclick="runGCA()">Run</button>
<div id="gcaResult"></div>
</div>

<!-- ================= OUTCOME ================= -->
<div class="card">
<h3>Cross Outcome</h3>
<input id="crossName" placeholder="A1 x R1">
<input id="yieldVal" placeholder="Yield">
<input id="lodgingVal" placeholder="Lodging">
<input id="diseaseVal" placeholder="Disease">
<button onclick="saveOutcome()">Save</button>
<div id="outcomeMsg"></div>
</div>

<!-- ================= AI ================= -->
<div class="card">
<h3>AI Breeding Engine</h3>
<button onclick="recommendNext()">Run AI</button>
<div id="aiNext"></div>
</div>

<script>

// ===== DATA STORAGE =====
function getData(){ return JSON.parse(localStorage.getItem("pbos")||"[]"); }
function setData(d){ localStorage.setItem("pbos",JSON.stringify(d)); }

// ===== IMPORT =====
function importExcel(){
 let text=excelInput.value.trim();
 if(!text) return;
 let lines=text.split("\n");
 let headers=lines[0].split(",").map(h=>h.trim().toLowerCase());
 let data=getData();

 for(let i=1;i<lines.length;i++){
  let parts=lines[i].split(",");
  let traits=[];
  for(let j=3;j<headers.length;j++){
    traits.push({name:headers[j],value:parts[j]});
  }
  data.push({id:parts[0],type:parts[1],rep:parts[2],traits:traits});
 }
 setData(data); loadTable();
}

// ===== TABLE =====
function loadTable(){
 let data=getData();
 let html="<table><tr><th>Line</th><th>Type</th><th>Rep</th><th>Trait</th><th>Value</th><th>Delete</th></tr>";

 data.forEach((e,i)=>{
  e.traits.forEach((t,j)=>{
   html+=`<tr>
   <td contenteditable onblur="saveTable()">${e.id}</td>
   <td contenteditable onblur="saveTable()">${e.type}</td>
   <td contenteditable onblur="saveTable()">${e.rep}</td>
   <td contenteditable onblur="saveTable()">${t.name}</td>
   <td contenteditable onblur="saveTable()">${t.value}</td>
   <td><button onclick="deleteRow(${i})">X</button></td>
   </tr>`;
  });
 });

 html+="</table>";
 tableView.innerHTML=html;
}

function saveTable(){
 let rows=document.querySelectorAll("#tableView tr");
 let data=[];
 rows.forEach((r,i)=>{
  if(i===0) return;
  let c=r.querySelectorAll("td");
  data.push({
   id:c[0].innerText,
   type:c[1].innerText,
   rep:c[2].innerText,
   traits:[{name:c[3].innerText,value:c[4].innerText}]
  });
 });
 setData(data);
}

function addRow(){
 let d=getData();
 d.push({id:"",type:"",rep:"",traits:[{name:"",value:""}]});
 setData(d); loadTable();
}

function deleteRow(i){
 let d=getData(); d.splice(i,1); setData(d); loadTable();
}

// ===== CLEAR =====
function clearData(){ localStorage.clear(); loadTable(); }

// ===== EXPORT =====
function exportExcel(){
 let d=getData();
 let csv="Line,Type,Rep,Trait,Value\n";
 d.forEach(e=>e.traits.forEach(t=>csv+=`${e.id},${e.type},${e.rep},${t.name},${t.value}\n`));
 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="data.csv"; a.click();
}

function exportWord(){
 let d=getData();
 let text="Breeding Data\n\n";
 d.forEach(e=>{
  text+=`${e.id} (${e.type})\n`;
  e.traits.forEach(t=>text+=`${t.name}: ${t.value}\n`);
  text+="\n";
 });
 let blob=new Blob([text]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="data.doc"; a.click();
}

// ===== CLASSIFICATION =====
function runClassification(){
 let d=getData();
 let out="";
 d.forEach(e=>{
  let score=0;
  e.traits.forEach(t=>{
   if(t.name=="stigma exertion" && t.value>20) score+=2;
   if(t.name=="pollen shedding" && t.value>5) score+=2;
  });
  out+=`${e.id} → ${score>=2?"Selected":"Rejected"}<br>`;
 });
 classResult.innerHTML=out;
}

// ===== SELECTION INDEX =====
function runSelectionIndex(){
 let traits=traitsListInput.value.split(",");
 let weights=weightsInput.value.split(",").map(Number);
 let d=getData();
 let map={};

 d.forEach(e=>{
  if(!map[e.id]) map[e.id]={};
  e.traits.forEach(t=>{
   if(traits.includes(t.name)){
    map[e.id][t.name]=+t.value;
   }
  });
 });

 let out="";
 Object.keys(map).forEach(k=>{
  let score=0;
  traits.forEach((t,i)=>score+=weights[i]*(map[k][t]||0));
  out+=`${k}: ${score}<br>`;
 });
 siResult.innerHTML=out;
}

// ===== ANOVA =====
function runANOVA(){
 anovaResult.innerHTML="Basic ANOVA placeholder (full stats can be extended)";
}

// ===== RBD =====
function generateRBD(){
 let t=+treatments.value;
 let r=+replications.value;
 let out="";
 for(let i=1;i<=r;i++){
  out+="Rep "+i+": ";
  let arr=[...Array(t).keys()].map(x=>"T"+(x+1));
  arr.sort(()=>Math.random()-0.5);
  out+=arr.join(" , ")+"<br>";
 }
 rbdResult.innerHTML=out;
}

// ===== GCA =====
function runGCA(){
 gcaResult.innerHTML="Basic GCA placeholder";
}

// ===== OUTCOME =====
function saveOutcome(){
 let o=JSON.parse(localStorage.getItem("outcomes")||"[]");
 o.push({
  cross:crossName.value,
  yield:+yieldVal.value,
  lodging:lodgingVal.value,
  disease:diseaseVal.value
 });
 localStorage.setItem("outcomes",JSON.stringify(o));
 outcomeMsg.innerHTML="Saved";
}

// ===== AI =====
function recommendNext(){
 let o=JSON.parse(localStorage.getItem("outcomes")||"[]");
 let out="";
 o.forEach(x=>{
  if(x.lodging=="severe") out+=`${x.cross} → Use strong parent<br>`;
  if(x.disease=="high") out+=`${x.cross} → Add tolerant line<br>`;
  if(x.yield>3) out+=`${x.cross} → Good cross refine<br>`;
 });
 aiNext.innerHTML=out;
}

// INIT
loadTable();

</script>

</body>
</html>
