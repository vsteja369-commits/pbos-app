<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBOS - Breeding System</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0;}
header { background:#2e7d32; color:white; padding:12px; text-align:center;}
.container { padding:10px;}
.card { background:white; padding:12px; margin-bottom:10px; border-radius:10px;}
input, textarea, button {
  width:100%; padding:10px; margin:5px 0;
  border-radius:6px; border:1px solid #ccc;
}
button { background:#2e7d32; color:white; font-weight:bold;}
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; text-align:center;}
</style>
</head>

<body>

<header><h2>🌾 PBOS - Breeding System</h2></header>

<div class="container">

<div class="card">
<h3>Excel Data Entry</h3>
<textarea id="excelInput" rows="6" placeholder="Line,Type,Rep,Height,Yield
A1,A Line,Rep 1,100,25"></textarea>
<button onclick="importExcelData()">Import</button>
</div>

<div class="card">
<h3>Editable Table</h3>
<div id="tableView"></div>
</div>

<div class="card">
<h3>ANOVA</h3>
<input id="anovaTrait" placeholder="Trait">
<button onclick="runANOVA()">Run</button>
<div id="anovaResult"></div>
</div>

<div class="card">
<h3>GCA / SCA</h3>
<input id="gcaTrait" placeholder="Trait">
<button onclick="runGCA()">Run</button>
<div id="gcaResult"></div>
</div>

<div class="card">
<h3>Selection Index</h3>
<input id="traitsListInput" placeholder="yield,height">
<input id="weightsInput" placeholder="0.7,0.3">
<button onclick="runSelectionIndex()">Run</button>
<div id="siResult"></div>
</div>
  
<div class="card">
<h3>Parent Classification & Cross Suggestions</h3>

<button onclick="runClassification()">Run Classification</button>

<div id="classResult"></div>
</div>
</div>

<script>

// ================= IMPORT =================
function importExcelData(){

  let text = excelInput.value.trim();
  if(!text) return;

  let lines = text.split("\n");
  let headers = lines[0].split(",").map(h=>h.trim().toLowerCase());

  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  for(let i=1;i<lines.length;i++){
    let parts = lines[i].split(",").map(x=>x.trim());

    let traits = [];
    for(let j=3;j<headers.length;j++){
      if(parts[j]){
        traits.push({name:headers[j],value:parts[j],unit:""});
      }
    }

    data.push({
      id: parts[0],
      type: parts[1],
      rep: parts[2],
      traits: traits
    });
  }

  localStorage.setItem("pbos", JSON.stringify(data));
  loadEntries();
}

// ================= TABLE =================
function renderTable(){

  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  let html="<table><tr><th>Line</th><th>Type</th><th>Rep</th><th>Trait</th><th>Value</th><th>Unit</th></tr>";

  data.forEach(e=>{
    e.traits.forEach(t=>{
      html += `<tr>
  <td contenteditable onblur="autoSaveTable()">${e.id}</td>
  <td contenteditable onblur="autoSaveTable()">${e.type}</td>
  <td contenteditable onblur="autoSaveTable()">${e.rep}</td>
  <td contenteditable onblur="autoSaveTable()">${t.name}</td>
  <td contenteditable onblur="autoSaveTable()">${t.value}</td>
  <td contenteditable onblur="autoSaveTable()">${t.unit || ""}</td>
</tr>`;
    });
  });

html+="</table><br><button onclick='addRow()'>Add Row</button>";

  tableView.innerHTML=html;
}
  function addRow(){

  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  data.push({
    id:"",
    type:"",
    rep:"",
    traits:[{name:"",value:"",unit:""}]
  });

  localStorage.setItem("pbos", JSON.stringify(data));

  loadEntries();
  }

function saveTable(){

  let rows=document.querySelectorAll("#tableView table tr");
  let newData=[];

  rows.forEach((r,i)=>{
    if(i===0) return;

    let c=r.querySelectorAll("td");

    newData.push({
      id:c[0].innerText,
      type:c[1].innerText,
      rep:c[2].innerText,
      traits:[{
        name:c[3].innerText,
        value:c[4].innerText,
        unit:c[5].innerText
      }]
    });
  });

  localStorage.setItem("pbos", JSON.stringify(newData));
  loadEntries();
}
  function autoSaveTable(){
  saveTable();
  }

// ================= ANOVA =================
function runANOVA(){

  let trait=anovaTrait.value.toLowerCase();
  let data=JSON.parse(localStorage.getItem("pbos")||"[]");

  let arr=[];
  data.forEach(e=>{
    e.traits.forEach(t=>{
      if(t.name.toLowerCase()==trait){
        arr.push({line:e.id,rep:e.rep,value:+t.value});
      }
    });
  });

  if(!arr.length) return;

  let gm=arr.reduce((a,b)=>a+b.value,0)/arr.length;

  let tm={}, reps={};

  arr.forEach(d=>{
    if(!tm[d.line]) tm[d.line]=[];
    if(!reps[d.rep]) reps[d.rep]=[];
    tm[d.line].push(d.value);
    reps[d.rep].push(d.value);
  });

  let means={};
  for(let k in tm){
    means[k]=tm[k].reduce((a,b)=>a+b,0)/tm[k].length;
  }

  let SST=arr.reduce((s,d)=>s+(d.value-gm)**2,0);

  let SSTr=0;
  for(let k in means){
    SSTr+=tm[k].length*(means[k]-gm)**2;
  }

  let SSE=SST-SSTr;

  let MSE=SSE/(arr.length-Object.keys(tm).length);
  let MSTr=SSTr/(Object.keys(tm).length-1);
  let F=MSTr/MSE;

  let LSD=2*Math.sqrt((2*MSE)/3);

  let out="Means:<br>";
  for(let k in means) out+=`${k}: ${means[k].toFixed(2)}<br>`;

  out+=`<br>F: ${F.toFixed(2)}<br>LSD: ${LSD.toFixed(2)}<br><br>`;

  let keys=Object.keys(means);
  for(let i=0;i<keys.length;i++){
    for(let j=i+1;j<keys.length;j++){
      let d=Math.abs(means[keys[i]]-means[keys[j]]);
      out+=`${keys[i]} vs ${keys[j]} → ${d.toFixed(2)} ${(d>LSD)?"✔":"✖"}<br>`;
    }
  }

  anovaResult.innerHTML=out;
}

// ================= GCA =================
function runGCA(){

  let trait=gcaTrait.value.toLowerCase();
  let data=JSON.parse(localStorage.getItem("pbos")||"[]");

  let crosses=[];

  data.forEach(e=>{
    if(e.type=="Hybrid"){
      e.traits.forEach(t=>{
        if(t.name.toLowerCase()==trait){
          let [A,R]=e.id.split("x").map(x=>x.trim());
          crosses.push({A,R,value:+t.value});
        }
      });
    }
  });

  if(!crosses.length) return;

  let gm=crosses.reduce((a,b)=>a+b.value,0)/crosses.length;

  let A={},R={};

  crosses.forEach(c=>{
    if(!A[c.A]) A[c.A]=[];
    if(!R[c.R]) R[c.R]=[];
    A[c.A].push(c.value);
    R[c.R].push(c.value);
  });

  let GCA_A={},GCA_R={};

  for(let k in A){
    GCA_A[k]=(A[k].reduce((a,b)=>a+b,0)/A[k].length)-gm;
  }

  for(let k in R){
    GCA_R[k]=(R[k].reduce((a,b)=>a+b,0)/R[k].length)-gm;
  }

  let out=`Grand Mean: ${gm.toFixed(2)}<br><br>`;

  for(let k in GCA_A) out+=`A ${k}: ${GCA_A[k].toFixed(2)}<br>`;
  out+="<br>";
  for(let k in GCA_R) out+=`R ${k}: ${GCA_R[k].toFixed(2)}<br>`;

  gcaResult.innerHTML=out;
}

// ================= SELECTION INDEX =================
function runSelectionIndex(){

  let traits=traitsListInput.value.toLowerCase().split(",");
  let weights=weightsInput.value.split(",").map(Number);

  let data=JSON.parse(localStorage.getItem("pbos")||"[]");

  let map={};

  data.forEach(e=>{
    if(!map[e.id]) map[e.id]={};

    e.traits.forEach(t=>{
      let val=+t.value;
      if(traits.includes(t.name.toLowerCase())){
        if(!map[e.id][t.name]) map[e.id][t.name]=[];
        map[e.id][t.name].push(val);
      }
    });
  });

  let score=[];

  for(let line in map){
    let s=0;

    traits.forEach((tr,i)=>{
      let arr=map[line][tr]||[];
      let m=arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
      s+=weights[i]*m;
    });

    score.push({line,s});
  }

  score.sort((a,b)=>b.s-a.s);

  let out="";
  score.forEach((x,i)=> out+=`${i+1}. ${x.line} → ${x.s.toFixed(2)}<br>`);

  siResult.innerHTML=out;
}

// ================= INIT =================
function loadEntries(){
  renderTable();
}

loadEntries();

  function runClassification(){

  let data = JSON.parse(localStorage.getItem("pbos")||"[]");

  let A_lines = {};
  let R_lines = [];

  // ===== GROUP DATA =====
  data.forEach(e=>{
    if(!A_lines[e.id]){
      A_lines[e.id] = {type:e.type, traits:{}};
    }

    e.traits.forEach(t=>{
      let val = parseFloat(t.value);
      if(!isNaN(val)){
        if(!A_lines[e.id].traits[t.name]){
          A_lines[e.id].traits[t.name] = [];
        }
        A_lines[e.id].traits[t.name].push(val);
      }
    });
  });

  // ===== MEAN CALCULATION =====
  let means = {};

  for(let line in A_lines){
    means[line] = {type:A_lines[line].type};

    for(let t in A_lines[line].traits){
      let arr = A_lines[line].traits[t];
      let mean = arr.reduce((a,b)=>a+b,0)/arr.length;
      means[line][t.toLowerCase()] = mean;
    }
  }

  // ===== CLASSIFICATION =====
  let result = [];

  for(let line in means){

    let m = means[line];
    let score = 0;
    let reject = false;
    let notes = [];

    // ===== A LINE RULES =====
    if(m.type === "A Line"){

      if(m["stigma exertion"] < 20){
        reject = true;
        notes.push("Low stigma");
      } else score += 2;

      if(m["spikelet opening"] < 5){
        reject = true;
        notes.push("Poor spikelet opening");
      } else score += 2;
    }

    // ===== R LINE RULES =====
    if(m.type === "R Line"){

      if(m["pollen shedding"] < 5){
        reject = true;
        notes.push("Low pollen");
      } else score += 2;

      if(m["anther size"] < 3){
        notes.push("Small anther");
      } else score += 1;
    }

    // ===== COMMON RULES =====
    if(m["plant height"] > 140){
      notes.push("Tall");
    } else score += 1;

    if(m["tiller per plant"] < 8){
      reject = true;
      notes.push("Low tillering");
    } else score += 1;

    if(m["productive tillers"] < 6){
      reject = true;
      notes.push("Low productive tillers");
    } else score += 1;

    result.push({
      line: line,
      type: m.type,
      score: score,
      reject: reject,
      notes: notes.join(", ")
    });
  }

  // ===== FILTER GOOD LINES =====
  let A_good = result.filter(x=>x.type==="A Line" && !x.reject);
  let R_good = result.filter(x=>x.type==="R Line" && !x.reject);

  // ===== CROSS MATCHING =====
  let crosses = [];

  A_good.forEach(a=>{
    R_good.forEach(r=>{

      let matchScore = (a.score + r.score)/2;

      let tag = "Moderate";

      if(matchScore > 5) tag = "High Match ✔";
      if(matchScore < 3) tag = "Poor ❌";

      crosses.push({
        cross: `${a.line} x ${r.line}`,
        score: matchScore,
        tag: tag
      });
    });
  });

  crosses.sort((a,b)=>b.score-a.score);

  // ===== OUTPUT =====
  let out = "<b>Line Classification:</b><br>";

  result.forEach(r=>{
    let status = r.reject ? "❌ Rejected" : "✔ Selected";
    out += `${r.line} (${r.type}) → Score: ${r.score} → ${status} (${r.notes})<br>`;
  });

  out += "<br><b>Top Cross Suggestions:</b><br>";

  crosses.slice(0,10).forEach(c=>{
    out += `${c.cross} → ${c.tag}<br>`;
  });

  document.getElementById("classResult").innerHTML = out;
  }

</script>

</body>
</html>
